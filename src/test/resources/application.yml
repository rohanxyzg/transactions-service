spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop   # H2 creates schema from entities; Flyway not involved
    show-sql: false
  flyway:
    enabled: false            # Flyway migrations are PostgreSQL-specific
