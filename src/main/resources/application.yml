spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transactions_db}
    username: ${DB_USER:transactions}
    password: ${DB_PASSWORD:transactions}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: 5
      connection-timeout: 10000       # fail fast: 10s waiting for a connection
      idle-timeout: 600000            # release idle connections after 10min
      max-lifetime: 1800000           # rotate connections after 30min (before Postgres closes them)
      keepalive-time: 60000           # heartbeat every 60s to prevent firewall drops
      leak-detection-threshold: 60000 # warn if a connection is held longer than 60s
      pool-name: TransactionsHikariPool
  jpa:
    hibernate:
      ddl-auto: validate              # never touch the schema at runtime; Flyway owns it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
