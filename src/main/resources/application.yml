spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transactions_db}
    username: ${DB_USER:transactions}
    password: ${DB_PASSWORD:transactions}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
